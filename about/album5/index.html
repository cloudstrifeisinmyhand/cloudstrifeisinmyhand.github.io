<script>
// 照片数据
const photos = [{"url":"https://i.imgur.com/91ArXPs.jpg"},{"url":"https://i.imgur.com/A2VdIbH.jpg"},{"url":"https://i.imgur.com/hz0adke.jpg"},{"url":"https://i.imgur.com/yv5RO4A.jpg"},{"url":"https://i.imgur.com/dJAil0I.jpg"},{"url":"https://i.imgur.com/B9uSfpJ.jpg"},{"url":"https://i.imgur.com/BU9WAHK.jpg"},{"url":"https://i.imgur.com/1puoMXI.jpg"},{"url":"https://i.imgur.com/2dbcl9W.jpg"},{"url":"https://i.imgur.com/ECZCF6B.jpg"},{"url":"https://i.imgur.com/mfiKsFf.jpg"},{"url":"https://i.imgur.com/EUZMPDb.jpg"},{"url":"https://i.imgur.com/T7aYI91.jpg"},{"url":"https://i.imgur.com/FRQ0rVv.jpg"},{"url":"https://i.imgur.com/L448KEL.jpg"},{"url":"https://i.imgur.com/zYAZkBW.jpg"},{"url":"https://i.imgur.com/qoCwIvX.jpg"},{"url":"https://i.imgur.com/TuOAcOZ.jpg"},{"url":"https://i.imgur.com/DAs32YR.jpg"},{"url":"https://i.imgur.com/1nHnZz2.jpg"},{"url":"https://i.imgur.com/XtkSsLF.jpg"},{"url":"https://i.imgur.com/zqupdjz.jpg"},{"url":"https://i.imgur.com/enfjYt0.jpg"}];
let currentIndex = 0;

// 获取关键DOM元素
const photoContainer = document.querySelector('.photo-container'); // 图片容器
const captionEl = document.getElementById('photo-caption');
const counterEl = document.getElementById('photo-counter');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

// 初始化显示
function updatePhoto() {
    if (!photos.length) {
        if (photoContainer) photoContainer.innerHTML = '<p>No photos</p>';
        captionEl.innerText = '';
        counterEl.innerText = '0/0';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
    }

    const photo = photos[currentIndex];
    
    // 清空容器并创建新的img元素
    photoContainer.innerHTML = ''; 
    const newImg = document.createElement('img');
    newImg.id = 'album-photo';
    newImg.className = 'album-photo';
    newImg.alt = photo.caption || '';
    
    // 生成带时间戳的URL（强制刷新）
    const separator = photo.url.includes('?') ? '&' : '?';
    const uniqueUrl = photo.url + separator + '_t=' + Date.now();
    newImg.src = uniqueUrl;
    
    // 图片加载成功/失败处理
    newImg.onload = () => {
        console.log('图片加载成功:', uniqueUrl);
        captionEl.innerText = photo.caption || '';
    };
    newImg.onerror = () => {
        console.error('图片加载失败:', uniqueUrl);
        captionEl.innerText = '图片加载失败，请重试';
        // 可以尝试回退到无时间戳的URL
        // newImg.src = photo.url;
    };
    
    // 将新图片添加到容器
    photoContainer.appendChild(newImg);
    
    // 更新计数器和按钮状态
    counterEl.innerText = `${currentIndex+1} / ${photos.length}`;
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === photos.length - 1;
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    if (photos.length) updatePhoto();

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            updatePhoto();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < photos.length - 1) {
            currentIndex++;
            updatePhoto();
        }
    });

    // show 按钮：完全重建图片
    const showBtn = document.getElementById('show-btn');
    if (showBtn) {
        showBtn.addEventListener('click', () => {
            console.log('show 按钮点击，当前索引:', currentIndex);
            // 直接重新调用 updatePhoto，它会重建整个图片元素
            updatePhoto();
        });
    } else {
        console.error('未找到 show-btn 元素');
    }
});
</script>
